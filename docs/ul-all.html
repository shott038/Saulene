<!doctype html>
<meta charset="utf-8">
<title>ul — all sprites & animations</title>
<style>
  body { margin: 0; background: #1e1e1e; color: #ccc; font: 13px ui-sans-serif, system-ui; }
  .head { padding: 22px 28px 6px; font-size: 15px; font-weight: 700; letter-spacing: .04em; color: #eee;
          border-top: 2px solid #333; }
  .head:first-of-type { border-top: 0; }
  .head span { color: #6a8; font-weight: 400; font-size: 12px; margin-left: 10px; }
  iframe { width: 100%; border: 0; display: block; }
</style>

<div class="head">SPRITE VARIATIONS <span>idle variants + reactive-state wisps (static)</span></div>
<iframe src="ul-wisps.html" id="f1" scrolling="no"></iframe>

<div class="head">ANIMATIONS <span>idle + every reactive animation (live)</span></div>
<iframe src="ul-idle.html" id="f2" scrolling="no"></iframe>

<script>
  // same-origin (localhost) → size each iframe to its content so it all reads as one page
  function fit(f) { try { f.style.height = (f.contentWindow.document.body.scrollHeight + 48) + "px"; } catch (e) { f.style.height = "1600px"; } }
  ["f1", "f2"].forEach((id) => {
    const f = document.getElementById(id);
    f.addEventListener("load", () => { fit(f); setTimeout(() => fit(f), 300); });
  });
  window.addEventListener("resize", () => ["f1", "f2"].forEach((id) => fit(document.getElementById(id))));
</script>
